# =============================================================================
# Diff-Navigation 统一配置文件
# 所有用户可修改的参数集中在此文件，shell 脚本自动读取并传参给各 launch 文件
# =============================================================================

# ---------------------------------------------------------------------------
# 定位模式 (首先选择)
#   lio - 激光雷达定位 (Livox Mid-360 / Avia)
#   vio - 视觉定位 (Intel RealSense D435)
# ---------------------------------------------------------------------------
localization_mode: lio

# ---------------------------------------------------------------------------
# 飞控参数 (传递给 px4ctrl)
# ---------------------------------------------------------------------------
flight_control:
  takeoff_height: 0.8      # 起飞高度 (m)
  takeoff_land_speed: 0.2  # 起飞/降落速度 (m/s)


# ---------------------------------------------------------------------------
# 规划参数 (传递给 diff_planner)
# ---------------------------------------------------------------------------
planner:
  # 飞行性能限制
  max_vel: 1.5             # 最大飞行速度 (m/s)
  max_acc: 3.0             # 最大加速度 (m/s^2)

  # 偏航控制参数 (传递给 traj_server)
  yaw_mode: 0              # 偏航模式: 0=自动对准轨迹方向 1=途中保持yaw角
  yaw_dot_max: 3.0         # 最大偏航角速度 (rad/s)
  yaw_dot_dot_max: 3.0     # 最大偏航角加速度 (rad/s^2)

  # 地图参数
  map_resolution: 0.2      # 地图分辨率 (m)
  inflation_size: 0.4      # 障碍物膨胀半径 (m) 注意：地图分辨率和膨胀半径要保持倍数关系

  # 虚拟墙 (飞行边界)
  enable_virtual_wall: true
  virtual_ceil: 2.0        # 虚拟天花板高度 (m)
  virtual_ground: 0.1      # 虚拟地板高度 (m)

  # 相机内参 (仅视觉定位模式使用)
  camera:
    cx: 319.31427001953125
    cy: 239.09725952148438
    fx: 386.2706298828125
    fy: 386.2706298828125

# ---------------------------------------------------------------------------
# 多点巡航参数 (传递给 multipoint)
# ---------------------------------------------------------------------------
multipoint:
  next_distance: 0.1       # 到达判定距离 (m), 距目标点小于此值视为到达
  auto_planning: true     # 起飞悬停后是否自动开始规划
  auto_landing: true      # 到达最后一个点后是否自动降落
  enable_yaw_align: true  # 是否启用 yaw 预对准 (飞行前先旋转朝向目标)
  yaw_align_thresh: 1.8    # yaw 预对准触发阈值 (rad)

  # 航点列表 (统一格式: [x, y, z, yaw, time])
  #   x, y, z  - 目标位置坐标 (m)
  #   yaw       - 目标偏航角 (rad), -100 表示自动对准轨迹方向
  #   time      - 到达后停留时间 (秒), 0 表示不停留
  points:
    - [2.0,  0.0,  0.8, -100, 0]
    - [2.0,  1.0,  0.8, -100, 0]
    - [0.0,  0.0,  0.8, 3.14, 0]

  # 返程航点 (仅位置, 格式: [x, y, z])
  back_points:
    - [0.0,  0.0,  0.8, -100, 0]

# ---------------------------------------------------------------------------
# 飞行日志
# ---------------------------------------------------------------------------
logging:
  enabled: true             # 是否启用飞行日志，随 navigation.sh 自动启动
  max_size_gb: 2.0          # 最大存储上限 (GB), 超出后自动覆盖最旧日志
  min_free_space_mb: 500    # 磁盘剩余空间下限 (MB), 低于此值暂停写入并告警
  session_retention: 50     # 最多保留场次数, 超出从最旧删除 (保留标记除外)

# ---------------------------------------------------------------------------
# 监控面板
# ---------------------------------------------------------------------------
monitor:
  enabled: true            # 是否启动监控面板
